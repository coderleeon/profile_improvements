name: Generate Snake

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  # Allow manual trigger of the workflow at any time
  workflow_dispatch:
  # Run on every push to the main branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Contribution Grid Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Prepare Output Directory
        run: |
          # Create .nojekyll to bypass Jekyll processing when using GitHub Pages
          touch dist/.nojekyll

      - name: Deploy SVGs to Output Branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: regenerate contribution snake animations [skip ci]"
          git branch -M output
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" output:output
